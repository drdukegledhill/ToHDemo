<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Towers of Hanoi - University of Huddersfield</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 28px;
        }

        .institution {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 10px;
        }

        h1 {
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(90deg, #c084fc, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.11);
            border-radius: 20px;
        }

        .control-panel {
            padding: 18px 28px;
            margin-bottom: 18px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.03em;
        }

        .slider-value {
            font-size: 15px;
            font-weight: 700;
            color: white;
            min-width: 24px;
            text-align: center;
        }

        input[type="range"] {
            width: 90px;
            accent-color: #c084fc;
            cursor: pointer;
        }

        .sep {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.11);
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 90px;
        }

        #startBtn {
            background: linear-gradient(135deg, #c084fc, #818cf8);
            color: white;
            box-shadow: 0 4px 15px rgba(192, 132, 252, 0.35);
        }

        #startBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(192, 132, 252, 0.5);
        }

        #startBtn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #resetBtn {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.78);
            border: 1px solid rgba(255,255,255,0.14);
        }

        #resetBtn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        .move-counter {
            font-size: 15px;
            font-weight: 500;
            color: rgba(255,255,255,0.45);
            margin-bottom: 16px;
            letter-spacing: 0.04em;
        }

        .move-counter span {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #c084fc, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-left: 6px;
        }

        .game-container {
            padding: 20px;
            margin-bottom: 18px;
        }

        canvas {
            display: block;
            border-radius: 12px;
        }

        .copyright {
            color: rgba(255,255,255,0.22);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header>
        <div class="institution">University of Huddersfield</div>
        <h1>Towers of Hanoi</h1>
    </header>

    <div class="card control-panel">
        <div class="control-group">
            <label for="diskCount">Disks</label>
            <input type="range" id="diskCount" min="1" max="15" value="3">
            <span class="slider-value" id="diskCountVal">3</span>
        </div>
        <div class="sep"></div>
        <div class="control-group">
            <label for="speedSlider">Speed</label>
            <input type="range" id="speedSlider" min="1" max="5" value="3">
        </div>
        <div class="sep"></div>
        <button id="startBtn">▶ Start</button>
        <button id="resetBtn">↺ Reset</button>
    </div>

    <div class="move-counter">MOVES <span id="moveCount">0</span></div>

    <div class="card game-container">
        <canvas id="gameCanvas" width="800" height="420"></canvas>
    </div>

    <div class="copyright">Copyright Duke Gledhill 2025</div>

    <script>
        class TowersOfHanoi {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.diskCount = 3;
                this.towers = [[], [], []];
                this.moves = [];
                this.currentMove = 0;
                this.isAnimating = false;
                this.animationSpeed = 15;
                this.moveCounter = 0;
                this.diskColors = {};

                // Animation state
                this.movingDisk = null;
                this.movingDiskPos = { x: 0, y: 0 };
                this.animationStep = 0;
                this.sourceX = 0;
                this.targetX = 0;
                this.sourceY = 0;
                this.targetY = 0;

                this.polePositions = [200, 400, 600];

                // Initialize controls
                this.startBtn = document.getElementById('startBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.diskCountInput = document.getElementById('diskCount');
                this.speedSlider = document.getElementById('speedSlider');
                this.moveCounterDisplay = document.getElementById('moveCount');

                this.setupEventListeners();
                this.initializeTowers();
            }

            setupEventListeners() {
                this.startBtn.addEventListener('click', () => this.startAnimation());
                this.resetBtn.addEventListener('click', () => this.resetTowers());
                this.diskCountInput.addEventListener('input', () => {
                    this.diskCount = parseInt(this.diskCountInput.value);
                    document.getElementById('diskCountVal').textContent = this.diskCount;
                    this.initializeTowers();
                });
                this.speedSlider.addEventListener('input', () => {
                    const speedMap = [30, 20, 15, 8, 3];
                    this.animationSpeed = speedMap[parseInt(this.speedSlider.value) - 1];
                });
            }

            generateRandomColor() {
                const colors = [
                    "#FF3B30", "#FF9500", "#FFCC00", "#4CD964", "#5856D6", "#007AFF",
                    "#5AC8FA", "#AF52DE", "#FF2D55", "#E35C3B", "#30B0C7", "#2ED157",
                    "#64D2FF", "#FF375F", "#FFD60A", "#BF5AF2"
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            initializeTowers() {
                this.towers = [Array.from({length: this.diskCount}, (_, i) => this.diskCount - i), [], []];
                this.moves = [];
                this.currentMove = 0;
                this.moveCounter = 0;
                this.moveCounterDisplay.textContent = '0';
                this.isAnimating = false;
                this.movingDisk = null;

                // Initialize disk colors
                this.diskColors = {};
                for (let i = 1; i <= this.diskCount; i++) {
                    this.diskColors[i] = this.generateRandomColor();
                }

                this.startBtn.disabled = false;
                this.draw();
            }

            resetTowers() {
                this.isAnimating = false;
                this.initializeTowers();
            }

            solveHanoi(n, source, target, auxiliary) {
                if (n > 0) {
                    this.solveHanoi(n - 1, source, auxiliary, target);
                    this.moves.push([source, target]);
                    this.solveHanoi(n - 1, auxiliary, target, source);
                }
            }

            adjustColor(hex, amount) {
                const num = parseInt(hex.slice(1), 16);
                const r = Math.min(255, Math.max(0, (num >> 16) + amount));
                const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + amount));
                const b = Math.min(255, Math.max(0, (num & 0xff) + amount));
                return `rgb(${r},${g},${b})`;
            }

            draw() {
                const ctx = this.ctx;
                const W = this.canvas.width;
                const H = this.canvas.height;

                // Canvas background gradient
                const bg = ctx.createLinearGradient(0, 0, 0, H);
                bg.addColorStop(0, '#1a1a2e');
                bg.addColorStop(1, '#16213e');
                ctx.fillStyle = bg;
                ctx.fillRect(0, 0, W, H);

                // Subtle dot grid
                ctx.fillStyle = 'rgba(255,255,255,0.025)';
                for (let x = 20; x < W; x += 40) {
                    for (let y = 20; y < H; y += 40) {
                        ctx.beginPath();
                        ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // Base platform
                const baseY = 345;
                const baseGrad = ctx.createLinearGradient(50, baseY, 50, baseY + 20);
                baseGrad.addColorStop(0, '#5c3d2e');
                baseGrad.addColorStop(0.4, '#7a5240');
                baseGrad.addColorStop(1, '#2c1f15');
                ctx.fillStyle = baseGrad;
                ctx.beginPath();
                ctx.roundRect(50, baseY, 700, 20, 6);
                ctx.fill();

                // Base top sheen
                ctx.fillStyle = 'rgba(255,255,255,0.07)';
                ctx.beginPath();
                ctx.roundRect(50, baseY, 700, 7, [6, 6, 0, 0]);
                ctx.fill();

                // Poles
                for (const x of this.polePositions) {
                    const poleGrad = ctx.createLinearGradient(x - 7, 0, x + 7, 0);
                    poleGrad.addColorStop(0, '#4a2e12');
                    poleGrad.addColorStop(0.3, '#8b6543');
                    poleGrad.addColorStop(0.6, '#a07850');
                    poleGrad.addColorStop(1, '#4a2e12');
                    ctx.fillStyle = poleGrad;
                    ctx.beginPath();
                    ctx.roundRect(x - 7, 88, 14, 257, 4);
                    ctx.fill();

                    // Pole top cap
                    const capGrad = ctx.createRadialGradient(x - 2, 87, 1, x, 88, 8);
                    capGrad.addColorStop(0, '#c09060');
                    capGrad.addColorStop(1, '#5c3d20');
                    ctx.fillStyle = capGrad;
                    ctx.beginPath();
                    ctx.ellipse(x, 88, 8, 5, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Tower labels
                const labels = ['Source', 'Auxiliary', 'Target'];
                ctx.font = '600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                for (let i = 0; i < 3; i++) {
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillText(labels[i].toUpperCase(), this.polePositions[i], 398);
                }

                // Draw stationary disks
                this.towers.forEach((tower, towerIdx) => {
                    tower.forEach((diskSize, height) => {
                        if (diskSize !== this.movingDisk) {
                            this.drawDisk(
                                this.polePositions[towerIdx],
                                320 - height * 20,
                                diskSize
                            );
                        }
                    });
                });

                // Draw moving disk
                if (this.movingDisk !== null) {
                    this.drawDisk(
                        this.movingDiskPos.x,
                        this.movingDiskPos.y,
                        this.movingDisk
                    );
                }
            }

            drawDisk(x, y, size) {
                const ctx = this.ctx;
                const width = size * 20;
                const h = 18;
                const r = 9;
                const color = this.diskColors[size];

                // Drop shadow (no downward offset — prevents visual bleed into base)
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 0;

                // Main body gradient (top highlight → base colour → dark underside)
                const bodyGrad = ctx.createLinearGradient(x - width/2, y, x - width/2, y + h);
                bodyGrad.addColorStop(0,    this.adjustColor(color, 50));
                bodyGrad.addColorStop(0.45, color);
                bodyGrad.addColorStop(1,    this.adjustColor(color, -60));
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.roundRect(x - width/2, y, width, h, r);
                ctx.fill();

                // Reset shadow
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                // Top specular shine
                const shineGrad = ctx.createLinearGradient(x - width/2, y, x - width/2, y + h * 0.55);
                shineGrad.addColorStop(0, 'rgba(255,255,255,0.38)');
                shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = shineGrad;
                ctx.beginPath();
                ctx.roundRect(x - width/2 + 2, y + 1, width - 4, h * 0.55, [r, r, 0, 0]);
                ctx.fill();

                // Subtle outline
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(x - width/2, y, width, h, r);
                ctx.stroke();
            }

            async animateDiskMovement() {
                if (!this.isAnimating || this.movingDisk === null) return;

                const TOTAL_STEPS = 10;

                if (this.animationStep < TOTAL_STEPS) {
                    // Moving up
                    const progress = this.animationStep / TOTAL_STEPS;
                    this.movingDiskPos.y = this.sourceY - (progress * 240);
                } else if (this.animationStep < TOTAL_STEPS * 2) {
                    // Moving sideways
                    const progress = (this.animationStep - TOTAL_STEPS) / TOTAL_STEPS;
                    this.movingDiskPos.x = this.sourceX + (this.targetX - this.sourceX) * progress;
                } else if (this.animationStep < TOTAL_STEPS * 3) {
                    // Moving down
                    const progress = (this.animationStep - TOTAL_STEPS * 2) / TOTAL_STEPS;
                    this.movingDiskPos.y = 100 + (this.targetY - 100) * progress;
                } else {
                    // Complete move
                    this.towers[this.currentTarget].push(this.movingDisk);
                    this.movingDisk = null;
                    this.currentMove++;
                    this.moveCounter++;
                    this.moveCounterDisplay.textContent = `${this.moveCounter}`;

                    if (this.currentMove >= this.moves.length) {
                        this.isAnimating = false;
                        this.startBtn.disabled = false;
                    } else {
                        this.startDiskMovement();
                    }

                    this.draw();
                    return;
                }

                this.animationStep++;
                this.draw();
                setTimeout(() => this.animateDiskMovement(), this.animationSpeed);
            }

            startDiskMovement() {
                if (this.currentMove >= this.moves.length) return;

                const [sourceIdx, targetIdx] = this.moves[this.currentMove];
                this.currentSource = sourceIdx;
                this.currentTarget = targetIdx;

                this.movingDisk = this.towers[sourceIdx].pop();

                const sourceHeight = this.towers[sourceIdx].length;
                const targetHeight = this.towers[targetIdx].length;

                this.sourceX = this.polePositions[sourceIdx];
                this.sourceY = 320 - sourceHeight * 20;
                this.targetX = this.polePositions[targetIdx];
                this.targetY = 320 - targetHeight * 20;

                this.movingDiskPos = { x: this.sourceX, y: this.sourceY };
                this.animationStep = 0;

                this.animateDiskMovement();
            }

            startAnimation() {
                if (this.isAnimating) return;

                // Save colors
                const savedColors = {...this.diskColors};

                // Reset state
                this.towers = [Array.from({length: this.diskCount}, (_, i) => this.diskCount - i), [], []];
                this.moves = [];
                this.currentMove = 0;
                this.isAnimating = false;
                this.movingDisk = null;
                this.movingDiskPos = { x: 0, y: 0 };
                this.animationStep = 0;
                this.moveCounter = 0;
                this.moveCounterDisplay.textContent = '0';

                // Restore colors
                this.diskColors = savedColors;

                this.isAnimating = true;
                this.startBtn.disabled = true;

                // Generate moves
                this.solveHanoi(this.diskCount, 0, 2, 1);

                this.startDiskMovement();
            }
        }

        // Start the game when the page loads
        window.onload = () => {
            new TowersOfHanoi();
        };
    </script>
</body>
</html>
